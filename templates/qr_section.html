
<section id="generator" class="section">
  <h2 class="section-title">Try the QR Code Generator</h2>
  <p class="section-description">
    Enter any URL below to generate a QR Code instantly.
    The QR code never expires and can be downloaded with a transparent background.
  </p>
  <div class="generator-wrapper">
    <section class="card">
      <form method="post">
        <input
          type="url"
          name="url"
          placeholder="Paste your link here"
          value="{{ url or '' }}"
          required
        />
        <button type="submit">Generate</button>
      </form>
      {% if qr_image %}
        <div class="result fade-in" id="result">
          <img src="data:image/png;base64,{{ qr_image }}" alt="QR Code">

          <div class="actions">
            <a href="data:image/png;base64,{{ qr_image }}" download="qr-code.png">
              <button type="button">Download</button>
            </a>

            <button type="button" class="danger" id="delete-btn">
              Delete
            </button>
          </div>
        </div>
      {% endif %}
    </section>
  </div>
</section>
