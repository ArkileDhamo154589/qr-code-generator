<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QR Code Generator</title>
<link rel="stylesheet" href="{{ url_for('static', filename='styke.css') }}">
</head>
<body>
  <section class="card">
    <h2>QR Code Generator</h2>
    <form method="post" id="qr-form">
      <input
        type="url"
        name="url"
        id="url-input"
        placeholder="Paste your link here"
        value="{{ url }}"
        required
      />
      <button type="submit" id="generate-btn">Generate</button>
    </form>

    {% if qr_image %}
      <div class="result" id="result">
        <img
          src="data:image/png;base64,{{ qr_image }}"
          alt="QR Code"
        />

        <div class="actions">
          <a
            href="data:image/png;base64,{{ qr_image }}"
            download="qr-code.png"
          >
            <button type="button">Download</button>
          </a>

          <button type="button" class="danger" id="delete-btn">
            Delete
          </button>
        </div>
      </div>
    {% endif %}
  </section>
  <script>
    const deleteBtn = document.getElementById("delete-btn");
    const urlInput = document.getElementById("url-input");
    const result = document.getElementById("result");

    if (deleteBtn) {
      deleteBtn.addEventListener("click", () => {
        if (result) result.remove();
        if (urlInput) urlInput.value = "";
      });
    }
  </script>

</body>
</html>
